<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #ffffff;
    }

    .field {
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 11px;
      color: #8888aa;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      background: #0f0f1e;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: rgba(130, 130, 255, 0.5);
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 14px 0;
    }

    .export-section h3 {
      font-size: 12px;
      color: #8888aa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .export-buttons {
      display: flex;
      gap: 8px;
    }

    .export-btn {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: #2a2a5a;
      color: #d0d0e8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-align: center;
    }

    .export-btn:hover {
      background: #3a3a7a;
      transform: scale(1.02);
    }

    .export-btn:active {
      transform: scale(0.98);
    }

    .export-btn .format {
      font-family: monospace;
      font-size: 14px;
      font-weight: 700;
      display: block;
      margin-bottom: 2px;
    }

    .export-btn .desc {
      font-size: 10px;
      color: #8888aa;
    }

    #status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
    }

    #status.info {
      display: block;
      background: rgba(100, 100, 255, 0.15);
      color: #aaaaff;
    }

    #status.success {
      display: block;
      background: rgba(100, 200, 100, 0.15);
      color: #6bc96b;
    }

    #status.error {
      display: block;
      background: rgba(255, 100, 100, 0.15);
      color: #ff6b6b;
    }

    #wordcount {
      display: none;
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      background: rgba(100, 200, 100, 0.08);
      font-size: 11px;
      text-align: center;
      color: #8888aa;
    }

    .wc-label {
      color: #8888aa;
    }

    .wc-num {
      color: #d0d0e8;
      font-weight: 600;
      font-family: monospace;
    }

    .hint {
      margin-top: 12px;
      font-size: 10.5px;
      color: #555577;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>ChatGPT Exporter</h2>

  <div class="field">
    <label>User label</label>
    <input type="text" id="userLabel" placeholder="USER">
  </div>

  <div class="field">
    <label>Assistant label</label>
    <input type="text" id="assistantLabel" placeholder="ASSISTANT">
  </div>

  <div class="divider"></div>

  <div class="export-section">
    <h3>Export current conversation</h3>
    <div class="export-buttons">
      <button class="export-btn" id="exportMd">
        <span class="format">.md</span>
        <span class="desc">Markdown text</span>
      </button>
      <button class="export-btn" id="exportJson">
        <span class="format">.json</span>
        <span class="desc">Structured data</span>
      </button>
    </div>
  </div>

  <div id="status"></div>
  <div id="wordcount"></div>

  <div class="hint">
    Open a ChatGPT conversation, then click a format above to export.
    Labels are saved automatically when you export.
  </div>

  <script src="popup.js"></script>
</body>
</html>
